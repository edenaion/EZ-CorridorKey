name: 💡 Feature Request
description: Suggest a new idea, enhancement, or improvement.
title: "[Feature]: "
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Before submitting, please check if a similar request already exists.

        **Good feature requests are:**
        - Clear and descriptive
        - Focused on solving a specific problem
        - Documented with examples when helpful

  - type: input
    id: motivation
    attributes:
      label: Problem or Motivation
      description: What problem does this solve, or what's the motivation behind it?
      placeholder: "Currently, I have to manually... It would be great if..."
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this feature to work. Include user-facing changes, API changes, or behavior changes.
      placeholder: |
        Example:
        - Add a new `--output-format json` flag to the CLI
        - Automatically detect when config is stale and prompt user
        - Expose new `analyze()` method on the service API
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered other solutions or approaches? Explain why the proposed solution is preferable.
      placeholder: "I considered using X instead, but Y would be better because..."

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any mockups, screenshots, links to related discussions, or references that might be helpful.

  - type: checkboxes
    id: checklist
    attributes:
      label: Prerequisites
      options:
        - label: I have searched for existing feature requests and found none
          required: true
        - label: This feature is not already in progress or planned
          required: true

  - type: checkboxes
    id: agreement
    attributes:
      label: Agreement
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
        - label: I understand this feature will be reviewed and may not be implemented
          required: false
