services:
  corridorkey-cpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: corridorkey:cpu
    container_name: corridorkey-cpu
    ports:
      - "127.0.0.1:6080:6080"
      - "127.0.0.1:6081:6081"
      - "127.0.0.1:5900:5900"
    environment:
      DISPLAY: ":1"
      QT_QPA_PLATFORM: "xcb"
      CORRIDORKEY_CONTAINER_MODE: "1"
      CORRIDORKEY_RESOLUTION: "3840x2160x24"
      CORRIDORKEY_PYTHON_VERSION: "3.11"
      CORRIDORKEY_INSTALL_SAM2: "n"
      CORRIDORKEY_PREDOWNLOAD_SAM2: "n"
      CORRIDORKEY_INSTALL_GVM: "y"
      CORRIDORKEY_INSTALL_VIDEOMAMA: "n"
    volumes:
      - corridorkey_install:/opt/corridorkey
      - corridorkey_projects:/opt/corridorkey/Projects
      - corridorkey_models_corridorkey:/opt/corridorkey/CorridorKeyModule/checkpoints
      - corridorkey_models_gvm:/opt/corridorkey/gvm_core/weights
      - corridorkey_models_videomama:/opt/corridorkey/VideoMaMaInferenceModule/checkpoints
      - corridorkey_hf_cache:/root/.cache/huggingface/hub
      - corridorkey_config:/root/.config/corridorkey
      - corridorkey_logs:/opt/corridorkey/logs
      - corridorkey_uploads:/opt/corridorkey/ClipsForInference
    restart: unless-stopped
    stdin_open: true
    tty: true

  corridorkey-gpu:
    profiles: ["gpu"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: corridorkey:gpu
    container_name: corridorkey-gpu
    runtime: nvidia
    environment:
      DISPLAY: ":1"
      QT_QPA_PLATFORM: "xcb"
      CORRIDORKEY_CONTAINER_MODE: "1"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,display"
      CORRIDORKEY_RESOLUTION: "1100x650x24"
      CORRIDORKEY_PYTHON_VERSION: "3.11"
      CORRIDORKEY_INSTALL_SAM2: "y"
      CORRIDORKEY_PREDOWNLOAD_SAM2: "n"
      CORRIDORKEY_INSTALL_GVM: "n"
      CORRIDORKEY_INSTALL_VIDEOMAMA: "n"
    ports:
      - "127.0.0.1:6080:6080"
      - "127.0.0.1:6081:6081"
      - "127.0.0.1:5900:5900"
    volumes:
      - corridorkey_install:/opt/corridorkey
      - corridorkey_projects:/opt/corridorkey/Projects
      - corridorkey_models_corridorkey:/opt/corridorkey/CorridorKeyModule/checkpoints
      - corridorkey_models_gvm:/opt/corridorkey/gvm_core/weights
      - corridorkey_models_videomama:/opt/corridorkey/VideoMaMaInferenceModule/checkpoints
      - corridorkey_hf_cache:/root/.cache/huggingface/hub
      - corridorkey_config:/root/.config/corridorkey
      - corridorkey_logs:/opt/corridorkey/logs
      - corridorkey_uploads:/opt/corridorkey/ClipsForInference
    restart: unless-stopped
    stdin_open: true
    tty: true

  # AMD ROCm — baked .venv at build time (no 1-install.sh). Does not mount corridorkey_install
  # over /opt/corridorkey (unlike CPU/GPU). CORRIDORKEY_INSTALL_* env vars do not re-provision
  # deps; extend Dockerfile.rocm or run manual uv pip in a derived image for tracker/SAM2 extras.
  corridorkey-rocm:
    profiles: ["rocm"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.rocm
      target: rocm-vnc
    image: corridorkey:rocm
    container_name: corridorkey-rocm
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    environment:
      DISPLAY: ":1"
      QT_QPA_PLATFORM: "xcb"
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      CORRIDORKEY_CONTAINER_MODE: "1"
      CORRIDORKEY_RESOLUTION: "1920x1080x24"
      HSA_OVERRIDE_GFX_VERSION: "10.3.0"
    ports:
      - "127.0.0.1:6080:6080"
      - "127.0.0.1:6081:6081"
      - "127.0.0.1:5900:5900"
    volumes:
      - corridorkey_projects:/opt/corridorkey/Projects
      - corridorkey_models_corridorkey:/opt/corridorkey/CorridorKeyModule/checkpoints
      - corridorkey_models_gvm:/opt/corridorkey/gvm_core/weights
      - corridorkey_models_videomama:/opt/corridorkey/VideoMaMaInferenceModule/checkpoints
      - corridorkey_hf_cache:/root/.cache/huggingface/hub
      - corridorkey_config:/root/.config/corridorkey
      - corridorkey_logs:/opt/corridorkey/logs
      - corridorkey_uploads:/opt/corridorkey/ClipsForInference
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  corridorkey_install:
    name: corridorkey_install
  corridorkey_projects:
    name: corridorkey_projects
  corridorkey_models_corridorkey:
    name: corridorkey_models_corridorkey
  corridorkey_models_gvm:
    name: corridorkey_models_gvm
  corridorkey_models_videomama:
    name: corridorkey_models_videomama
  corridorkey_hf_cache:
    name: corridorkey_hf_cache
  corridorkey_config:
    name: corridorkey_config
  corridorkey_logs:
    name: corridorkey_logs
  corridorkey_uploads:
    name: corridorkey_uploads
