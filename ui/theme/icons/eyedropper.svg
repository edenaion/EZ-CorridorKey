<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Classic eyedropper tool cursor, tip at bottom-left (2,30) -->
  <g fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tip / nib (pointed) -->
    <path d="M3 29 L8 24" stroke-width="2"/>
    <!-- Lower barrel (narrowing to tip) -->
    <path d="M8 24 L10 20 L16 26 L12 28 Z" fill="#FFFFFF" stroke="#000000" stroke-width="0.8"/>
    <!-- Upper barrel / body -->
    <path d="M10 20 L20 10 L24 14 L16 26" fill="#CCCCCC" stroke="#000000" stroke-width="0.8"/>
    <!-- Ring between barrel and bulb -->
    <line x1="20" y1="10" x2="24" y2="14" stroke="#000000" stroke-width="1.5"/>
    <!-- Bulb / reservoir -->
    <path d="M20 10 L22 5 Q25 2 28 5 L28 5 Q31 8 28 11 L24 14" fill="#888888" stroke="#000000" stroke-width="0.8"/>
  </g>
  <!-- Black outline for visibility on light backgrounds -->
  <path d="M3 29 L8 24" stroke="#000000" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.3"/>
</svg>
